trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: Build
    displayName: 'Build & Test'
    jobs:
      - job: BuildAndTest
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
            displayName: 'Install Node.js'

          - script: npm ci
            displayName: 'Install dependencies'

          - script: npm run lint
            displayName: 'Run ESLint'

          - script: npm run test-coverage
            displayName: 'Run unit tests with coverage'

          - script: npm run test:a11y
            displayName: 'Run accessibility tests'

          # OWASP dependency check — runs on every PR
          - task: dependency-check-build-task@6
            inputs:
              projectName: 'demo-app'
              scanPath: '$(Build.SourcesDirectory)'
              format: 'HTML,JUNIT'
              failOnCVSS: '7'
            displayName: 'OWASP Dependency Check'

          # SonarCloud analysis — runs on every PR
          - task: SonarCloudPrepare@2
            inputs:
              SonarCloud: 'SonarCloud-ServiceConnection'
              organization: 'demo-org'
              scannerMode: 'CLI'
              configMode: 'manual'
              cliProjectKey: 'demo-app'
              cliSources: 'src'
            displayName: 'Prepare SonarCloud Analysis'

          - task: SonarCloudAnalyze@2
            displayName: 'Run SonarCloud Analysis'

          - task: SonarCloudPublish@2
            inputs:
              pollingTimeoutSec: '300'
            displayName: 'Publish SonarCloud Results'

          - script: npm run build
            displayName: 'Build production bundle'

          - task: Docker@2
            inputs:
              command: 'buildAndPush'
              repository: 'demo-app'
              dockerfile: 'Dockerfile'
              tags: '$(Build.BuildId)'
            displayName: 'Build & Push Docker Image'

  - stage: Deploy
    displayName: 'Deploy to Azure'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployToAppService
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebAppContainer@1
                  inputs:
                    azureSubscription: 'Azure-ServiceConnection'
                    appName: 'demo-app-prod'
                    containers: 'demo-app:$(Build.BuildId)'
                  displayName: 'Deploy to Azure App Service'
